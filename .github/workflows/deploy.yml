name: Deploy to GitHub Pages

on:
  push:
    branches: [prod]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write build info for browser console
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const sha = process.env.GITHUB_SHA || "";
          const short = sha.slice(0, 7);
          const runNum = process.env.GITHUB_RUN_NUMBER || "";
          const runId = process.env.GITHUB_RUN_ID || "";
          const t = new Date().toISOString();
          const buildId = short + (runNum ? "-" + runNum : "");
          const lines = [
            "// Generated by GitHub Actions",
            "export const BUILD_ID = " + JSON.stringify(buildId) + ";",
            "export const GIT_SHA = " + JSON.stringify(sha) + ";",
            "export const RUN_NUMBER = " + JSON.stringify(runNum) + ";",
            "export const RUN_ID = " + JSON.stringify(runId) + ";",
            "export const BUILD_TIME = " + JSON.stringify(t) + ";",
            "",
          ];
          fs.writeFileSync("src/config/build-info.js", lines.join("\n"));
          NODE
          echo "Wrote src/config/build-info.js (short sha-runNumber, full sha, UTC time)."
      - name: Write Google Drive config from GitHub secrets
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -z "$GOOGLE_DRIVE_FOLDER_ID" ] || [ -z "$GOOGLE_API_KEY" ]; then
            echo "::error::Set secrets GOOGLE_DRIVE_FOLDER_ID and GOOGLE_API_KEY (repo or github-pages environment: Settings → Secrets and variables)."
            exit 1
          fi
          node -e "require('fs').writeFileSync('src/config/app-config.local.json', JSON.stringify({ googleDrive: { folderId: process.env.GOOGLE_DRIVE_FOLDER_ID, apiKey: process.env.GOOGLE_API_KEY } }, null, 2));"
          echo "Wrote src/config/app-config.local.json for Pages (not committed; from secrets only)."
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
